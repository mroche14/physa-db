name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-Dwarnings"

jobs:
  ci:
    name: just ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install just and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest

      - name: Cache Cargo workspace
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: just ci
        shell: bash
        run: just ci

  privacy:
    name: privacy tree check (§7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No private/ paths tracked
        run: |
          leaked=$(git ls-files private/)
          if [ -n "$leaked" ]; then
            printf 'ERROR: private/ paths are committed (AGENTS.md §7 violation):\n%s\n' "$leaked" >&2
            exit 1
          fi

  docs-links:
    name: docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-loopback './**/*.md'
          fail: true

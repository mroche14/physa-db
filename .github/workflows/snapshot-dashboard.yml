name: Dashboard snapshot

# Regenerates dashboard/data/state.json from GitHub Issues + Projects v2
# and publishes the dashboard to GitHub Pages.
#
# See docs/architecture/adr/0001-project-tracking-store.md.

# Disabled by default while the repo is private and GitHub Pages is off.
# During M0/M1 we use GitHub Projects v2 as the pilot view — the dashboard
# SPA is the public-facing surface scheduled for M1 (public launch).
# Re-enable the triggers below when enabling Pages.
on:
  workflow_dispatch:
  # issues:
  #   types: [opened, edited, closed, reopened, labeled, unlabeled, milestoned, demilestoned]
  # pull_request:
  #   types: [opened, closed, reopened, labeled, unlabeled]
  # schedule:
  #   - cron: "*/30 * * * *"

permissions:
  contents: read
  issues: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: xtask

      - name: Build state.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHYSA_SNAPSHOT_OWNER: ${{ github.repository_owner }}
          PHYSA_SNAPSHOT_REPO: ${{ github.event.repository.name }}
        run: cargo run --release -p xtask -- snapshot-dashboard

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4

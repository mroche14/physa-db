name: Bug
description: Something is broken.
labels: ["type:bug", "status:ready"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or code snippet. Include `cargo` invocation.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true

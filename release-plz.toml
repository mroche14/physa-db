# release-plz configuration.
# See https://release-plz.ieni.dev/docs/config for the full reference.

[workspace]
# Create a unified release PR for the whole workspace. We can split per-crate later if needed.
release_always = false
pr_name = "chore(release): physa-db {{ version }}"
pr_labels = ["area:infra", "type:feature"]
publish_allow_dirty = false
# Publishing to crates.io is disabled until v0.1.0. Flip to true when ready.
publish = false
git_release_enable = true
git_release_type = "auto"
changelog_update = true
semver_check = true

# Per-package overrides can go here as we diverge versions.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """

## [{{ version }}]{% if release_link %}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} (**BREAKING**){% endif %}
{% endfor %}
{% endfor %}
"""
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^bench", group = "Benchmarks" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Chores" },
]

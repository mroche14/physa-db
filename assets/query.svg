<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="physa-db hybrid query plan: graph traversal, vector similarity, and BM25 converge into a single query plan">
  <g>
    <rect x="40" y="60" width="220" height="100" rx="8" fill="#ffffff" stroke="#C77F3E" stroke-width="2"/>
    <text x="50" y="85" font-size="13" font-weight="800" letter-spacing="1" fill="#C77F3E">GRAPH TRAVERSAL</text>
    <line x1="70" y1="128" x2="110" y2="128" stroke="#C77F3E" stroke-width="1.8"/>
    <line x1="110" y1="128" x2="148" y2="108" stroke="#C77F3E" stroke-width="1.8"/>
    <line x1="110" y1="128" x2="148" y2="148" stroke="#C77F3E" stroke-width="1.8"/>
    <circle cx="70" cy="128" r="5" fill="#C77F3E"/>
    <circle cx="110" cy="128" r="5" fill="#C77F3E"/>
    <circle cx="148" cy="108" r="5" fill="#C77F3E"/>
    <circle cx="148" cy="148" r="5" fill="#C77F3E"/>
    <text x="175" y="132" font-size="12" fill="#637B87" font-family="ui-monospace, 'SF Mono', monospace">-[*1..3]-&gt;</text>
  </g>

  <g>
    <rect x="40" y="200" width="220" height="100" rx="8" fill="#ffffff" stroke="#3DBDCD" stroke-width="2"/>
    <text x="50" y="225" font-size="13" font-weight="800" letter-spacing="1" fill="#3DBDCD">VECTOR SIMILARITY</text>
    <circle cx="75" cy="258" r="2.5" fill="#3DBDCD"/>
    <circle cx="92" cy="272" r="2.5" fill="#3DBDCD"/>
    <circle cx="110" cy="253" r="2.5" fill="#3DBDCD"/>
    <circle cx="105" cy="278" r="2.5" fill="#3DBDCD"/>
    <circle cx="125" cy="265" r="2.5" fill="#3DBDCD"/>
    <circle cx="140" cy="270" r="6" fill="#3DBDCD" stroke="#0B0D2E" stroke-width="1.5"/>
    <text x="175" y="272" font-size="12" fill="#637B87" font-family="ui-monospace, 'SF Mono', monospace">emb &lt;~&gt; $q</text>
  </g>

  <g>
    <rect x="40" y="340" width="220" height="100" rx="8" fill="#ffffff" stroke="#D4A017" stroke-width="2"/>
    <text x="50" y="365" font-size="13" font-weight="800" letter-spacing="1" fill="#D4A017">FULL-TEXT · BM25</text>
    <rect x="75" y="393" width="90" height="6" rx="2" fill="#D4A017"/>
    <rect x="75" y="405" width="68" height="6" rx="2" fill="#D4A017" opacity="0.7"/>
    <rect x="75" y="417" width="46" height="6" rx="2" fill="#D4A017" opacity="0.45"/>
    <text x="175" y="410" font-size="12" fill="#637B87" font-family="ui-monospace, 'SF Mono', monospace">MATCH $q</text>
  </g>

  <line x1="262" y1="110" x2="395" y2="250" stroke="#C77F3E" stroke-width="2.2"/>
  <line x1="262" y1="250" x2="395" y2="250" stroke="#3DBDCD" stroke-width="2.2"/>
  <line x1="262" y1="390" x2="395" y2="250" stroke="#D4A017" stroke-width="2.2"/>

  <g>
    <rect x="395" y="185" width="260" height="130" rx="10" fill="#0B0D2E"/>
    <text x="525" y="220" text-anchor="middle" font-size="12" font-weight="800" letter-spacing="3" fill="#C77F3E">PHYSA-DB</text>
    <text x="525" y="252" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">Hybrid query plan</text>
    <text x="525" y="277" text-anchor="middle" font-size="12" fill="#94B49F">one engine · one transaction</text>
    <text x="525" y="297" text-anchor="middle" font-size="12" fill="#94B49F">no external vector DB · no glue</text>
  </g>

  <line x1="655" y1="250" x2="758" y2="250" stroke="#0B0D2E" stroke-width="2.5"/>
  <polygon points="754,243 766,250 754,257" fill="#0B0D2E"/>

  <g>
    <rect x="770" y="210" width="200" height="80" rx="8" fill="#ffffff" stroke="#0B0D2E" stroke-width="2"/>
    <text x="870" y="245" text-anchor="middle" font-size="16" font-weight="700" fill="#0B0D2E">Ranked results</text>
    <text x="870" y="268" text-anchor="middle" font-size="12" fill="#637B87">typed rows · JSON-LD · streamed</text>
  </g>

  <text x="500" y="475" text-anchor="middle" font-size="14" fill="#637B87" font-style="italic">
    Three retrieval modes. One query plan. Zero cross-service round-trips.
  </text>
</svg>
